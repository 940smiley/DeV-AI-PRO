name: Self Repair

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: self-repair-${{ github.repository }}
  cancel-in-progress: true

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Apply safe dependency repairs
        run: |
          npm audit fix --package-lock-only || true
          npm dedupe || true

      - name: Verify project still compiles
        run: npm run check

      - name: Create repair PR if needed
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: 'chore: automated self-repair updates'
          title: 'chore: automated self-repair updates'
          body: |
            This automated PR applies safe repository self-repair updates:
            - `npm audit fix --package-lock-only`
            - `npm dedupe`
            - Build/typecheck verification via `npm run check`
          branch: automation/self-repair
          labels: |
            dependencies
            automerge

